 <div class="flex h-screen bg-zinc-950 text-zinc-100 overflow-hidden">

      <!-- ── Left Sidebar ── -->
      <aside class="w-60 shrink-0 flex flex-col bg-zinc-900 border-r border-zinc-800">

        <!-- Brand -->
        <div class="px-5 py-5 border-b border-zinc-800">
          <div class="flex items-center gap-2">
            <span class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-gradient-to-br from-amber-400 via-orange-400 to-rose-500 text-xs font-bold text-zinc-950">
              DW
            </span>
            <div>
              <p class="text-sm font-display font-bold text-amber-300 leading-none">Admin Panel</p>
              <p class="text-[10px] text-zinc-500 mt-0.5">DigitalWallet</p>
            </div>
          </div>
        </div>

        <!-- Nav Links -->
        <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
          @for (link of navLinks; track link.route) {
            <a
              [routerLink]="link.route"
              routerLinkActive="!bg-amber-400/15 !text-amber-300 !border-amber-400/30"
              [routerLinkActiveOptions]="{ exact: link.exact }"
              class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-zinc-400 border border-transparent transition-colors hover:bg-zinc-800 hover:text-zinc-100"
            >
              <span class="text-base leading-none">{{ link.icon }}</span>
              <span>{{ link.label }}</span>
            </a>
          }
        </nav>

        <!-- Admin Identity -->
        <div class="px-4 py-4 border-t border-zinc-800 flex items-center gap-3">
          <div class="h-8 w-8 shrink-0 rounded-lg bg-gradient-to-br from-amber-400 to-rose-500 flex items-center justify-center text-xs font-bold text-zinc-950">
            {{ adminInitials }}
          </div>
          <div class="min-w-0 flex-1">
            <p class="text-xs text-zinc-300 truncate">{{ adminEmail }}</p>
            <p class="text-[10px] text-zinc-500 uppercase tracking-wider mt-0.5">Administrator</p>
          </div>
          <button
            type="button"
            (click)="logout()"
            title="Logout"
            class="shrink-0 text-zinc-500 hover:text-rose-400 transition-colors text-lg leading-none"
          >⏻</button>
        </div>
      </aside>

      <!-- ── Main Area ── -->
      <div class="flex-1 flex flex-col overflow-hidden">

        <!-- Top Bar -->
        <header class="h-14 shrink-0 flex items-center justify-between px-6 border-b border-zinc-800 bg-zinc-950/80 backdrop-blur">
          <div class="flex items-center gap-2">
            <div class="h-2 w-2 rounded-full bg-emerald-400 animate-pulse"></div>
            <h1 class="font-display font-semibold text-zinc-100 text-sm">Admin Panel</h1>
          </div>
          <button
            type="button"
            (click)="logout()"
            class="px-4 py-1.5 rounded-xl border border-zinc-700 text-sm text-zinc-300 hover:border-rose-400/40 hover:text-rose-300 transition-colors"
          >
            Logout
          </button>
        </header>

        <!-- Page Content -->
        <main class="flex-1 overflow-y-auto bg-gradient-to-b from-zinc-900 to-zinc-950 p-6">
          <router-outlet />
        </main>

      </div>
    </div>
